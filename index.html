<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 1</title>

    <!-- My style -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <div class="card">
        <img src="images/illustration-hero.svg" alt="illustration-hero" class="cardTop">
        <div class="cardBottom">
            <h1>Order Summary</h1>
            <p>You can now listen to millions of songs, audiobooks, and podcasts on
                any device anywhere you like!
            </p>
            <ul class="list">
                <li><img src="images/icon-music.svg" alt=""></li>
                <li>
                    <div>
                        <small>Annual Plan</small>
                        <small>$59.99/year</small>
                    </div>
                </li>
                <li><a href="">Change</a></li>
            </ul>
            <button class="buttonOne"><p>Proceed to Payment</p></button>
            <button class="buttonTwo"><p>Cancel Order</p></button>
        </div>
    </div>
</body>
